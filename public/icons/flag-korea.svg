<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- White circle background -->
  <circle cx="50" cy="50" r="48" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <!-- Taegeuk (simplified S-curve red/blue) -->
  <path d="M50 5 A45 45 0 0 1 50 95 A22.5 22.5 0 0 1 50 50 A22.5 22.5 0 0 0 50 5" fill="#CD2E3A"/>
  <path d="M50 5 A45 45 0 0 0 50 95 A22.5 22.5 0 0 0 50 50 A22.5 22.5 0 0 1 50 5" fill="#0047A0"/>
  <!-- Center white circle for separation -->
  <circle cx="50" cy="50" r="8" fill="#ffffff"/>
  <!-- Simplified trigrams (black bars, approximate for small size) -->
  <!-- Top-left: three lines -->
  <g stroke="#000000" stroke-width="2.5">
    <line x1="18" y1="18" x2="32" y2="18"/>
    <line x1="18" y1="22" x2="32" y2="22"/>
    <line x1="18" y1="26" x2="32" y2="26"/>
    <!-- Top-right: broken lines -->
    <line x1="68" y1="18" x2="82" y2="18"/>
    <line x1="68" y1="22" x2="82" y2="22"/>
    <line x1="72" y1="26" x2="78" y2="26"/>
    <!-- Bottom-left: broken -->
    <line x1="18" y1="74" x2="32" y2="74"/>
    <line x1="22" y1="78" x2="28" y2="78"/>
    <line x1="18" y1="82" x2="32" y2="82"/>
    <!-- Bottom-right: three lines -->
    <line x1="68" y1="74" x2="82" y2="74"/>
    <line x1="68" y1="78" x2="82" y2="78"/>
    <line x1="68" y1="82" x2="82" y2="82"/>
  </g>
</svg>